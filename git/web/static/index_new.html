<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇帝记账仪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; background: linear-gradient(180deg, #7B68EE 0%, #9370DB 50%, #BA55D3 100%); }
        .hidden { display: none !important; }
        
        #auth-page { min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: white; border-radius: 20px; padding: 50px 60px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .card h2 { text-align: center; font-size: 28px; font-weight: 600; color: #333; margin-bottom: 40px; }
        
        .tabs { display: flex; margin-bottom: 30px; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 15px; background: none; border: none; font-size: 18px; color: #999; cursor: pointer; position: relative; transition: color 0.3s; }
        .tab.active { color: #6B7BFF; }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #6B7BFF, #9370DB); border-radius: 2px; }
        
        .form { display: flex; flex-direction: column; gap: 20px; }
        .form input { padding: 16px 20px; border: none; border-radius: 10px; background: #F0F4FF; font-size: 16px; transition: background 0.3s; }
        .form input:focus { outline: none; background: #E6ECFF; }
        .form input::placeholder { color: #BBB; }
        .btn { background: linear-gradient(90deg, #6B7BFF, #9370DB); color: white; padding: 16px; border: none; border-radius: 10px; font-size: 18px; font-weight: 500; cursor: pointer; margin-top: 10px; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(107,123,255,0.4); }
        .error { color: #e74c3c; font-size: 13px; text-align: center; min-height: 18px; margin-top: -10px; }
        
        #dashboard-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        #dashboard-page header { background: linear-gradient(90deg, #6B7BFF, #9370DB); width: 100%; max-width: 700px; padding: 20px 30px; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(107,123,255,0.3); }
        #dashboard-page header h1 { color: white; font-size: 24px; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        #user-name { color: rgba(255,255,255,0.9); font-size: 16px; }
        .logout { padding: 8px 20px; border: 1px solid rgba(255,255,255,0.5); color: white; background: rgba(255,255,255,0.1); border-radius: 20px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .logout:hover { background: rgba(255,255,255,0.2); }
        
        .main-content { background: white; width: 100%; max-width: 700px; border-radius: 0 0 12px 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .tabs-bar { display: flex; border-bottom: 1px solid #eee; }
        .tab-btn { flex: 1; padding: 18px; background: none; border: none; font-size: 16px; color: #999; cursor: pointer; position: relative; transition: color 0.3s; }
        .tab-btn.active { color: #6B7BFF; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background: #6B7BFF; }
        
        .panel { padding: 30px; }
        .panel h3 { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 25px; }
        
        .form-item { margin-bottom: 20px; }
        .form-item label { display: block; font-size: 14px; color: #666; font-weight: 500; margin-bottom: 10px; }
        .radio-group { display: flex; gap: 30px; }
        .radio-label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .radio-label input[type="radio"] { width: 18px; height: 18px; accent-color: #6B7BFF; }
        .radio-label span { font-size: 14px; color: #333; }
        .form-item select, .form-item input { width: 100%; padding: 12px 15px; border: 1px solid #eee; border-radius: 8px; font-size: 14px; background: white; transition: border-color 0.3s; }
        .form-item select:focus, .form-item input:focus { outline: none; border-color: #6B7BFF; }
        .form-item input::placeholder { color: #BBB; }
        .save-btn { width: 100%; padding: 14px; background: linear-gradient(90deg, #6B7BFF, #9370DB); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 10px; transition: transform 0.2s, box-shadow 0.2s; }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(107,123,255,0.4); }
        
        .stats-bar { display: flex; justify-content: space-around; padding: 20px; background: #f8f9fa; border-radius: 8px; margin-bottom: 25px; }
        .stat-item { text-align: center; }
        .stat-label { display: block; font-size: 14px; color: #999; margin-bottom: 5px; }
        .stat-value { font-size: 20px; font-weight: bold; }
        .stat-value.income { color: #4caf50; }
        .stat-value.expense { color: #e53935; }
        .stat-value.balance { color: #1976d2; }
        
        .records-table { width: 100%; border-collapse: collapse; }
        .records-table th, .records-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .records-table th { background: #f8f9fa; font-weight: 600; color: #666; font-size: 14px; }
        .records-table td { color: #333; font-size: 14px; }
        .delete { padding: 5px 12px; background: #ffebee; color: #e53935; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .delete:hover { background: #e53935; color: white; }
        .empty { text-align: center; padding: 40px; color: #999; font-size: 16px; }
    </style>
</head>
<body>
    <div id="auth-page">
        <div class="card">
            <h2>皇帝记账仪</h2>
            <div class="tabs">
                <button class="tab active" data-tab="register">注册</button>
                <button class="tab" data-tab="login">登录</button>
            </div>
            <form id="register-form" class="form">
                <input type="text" id="reg-username" placeholder="用户名" required>
                <input type="password" id="reg-password" placeholder="密码（至少8位，包含字母、数字、特殊符号）" required>
                <button type="submit" class="btn">注册</button>
                <p class="error" id="reg-error"></p>
            </form>
            <form id="login-form" class="form hidden">
                <input type="text" id="login-username" placeholder="用户名" required>
                <input type="password" id="login-password" placeholder="密码" required>
                <button type="submit" class="btn">登录</button>
                <p class="error" id="login-error"></p>
            </form>
        </div>
    </div>

    <div id="dashboard-page" class="hidden">
        <header>
            <h1>皇帝记账仪</h1>
            <div class="header-right">
                <span id="user-name">欢迎, </span>
                <button class="logout">退出</button>
            </div>
        </header>
        <div class="main-content">
            <div class="tabs-bar">
                <button class="tab-btn active" data-tab="add">添加记录</button>
                <button class="tab-btn" data-tab="view">查看记录</button>
            </div>
            <div id="add-panel" class="panel">
                <h3>添加记录</h3>
                <form id="add-form">
                    <div class="form-item">
                        <label>类型</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="sort" value="Income" checked><span>收入</span></label>
                            <label class="radio-label"><input type="radio" name="sort" value="Expense"><span>支出</span></label>
                        </div>
                    </div>
                    <div class="form-item">
                        <label>分类</label>
                        <select id="category" required><option value="">请选择分类</option></select>
                    </div>
                    <div class="form-item">
                        <label>金额</label>
                        <input type="number" id="amount" step="0.01" min="0.01" placeholder="请输入金额" required>
                    </div>
                    <div class="form-item">
                        <label>备注</label>
                        <input type="text" id="note" placeholder="请输入备注">
                    </div>
                    <div class="form-item">
                        <label>日期</label>
                        <input type="datetime-local" id="date" required>
                    </div>
                    <div class="form-item">
                        <label>余额</label>
                        <input type="number" id="total" step="0.01" placeholder="当前余额" required>
                    </div>
                    <button type="submit" class="save-btn">保存</button>
                </form>
            </div>
            <div id="view-panel" class="panel hidden">
                <div class="stats-bar">
                    <div class="stat-item"><span class="stat-label">总收入</span><span class="stat-value income" id="total-income">¥0.00</span></div>
                    <div class="stat-item"><span class="stat-label">总支出</span><span class="stat-value expense" id="total-expense">¥0.00</span></div>
                    <div class="stat-item"><span class="stat-label">结余</span><span class="stat-value balance" id="balance">¥0.00</span></div>
                </div>
                <table class="records-table">
                    <thead><tr><th>类型</th><th>分类</th><th>金额</th><th>备注</th><th>日期</th><th>操作</th></tr></thead>
                    <tbody id="records-body"></tbody>
                </table>
                <div id="empty" class="empty">暂无记录</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const IncomeCategories = ['工资','奖金','投资收益','兼职','其他收入'];
        const ExpenseCategories = ['餐饮','交通','购物','娱乐','医疗','教育','住房','其他支出'];
        let user = null;

        function init() {
            bindAuthTabs(); bindForms(); bindDashboard(); updateCategories(); checkLogin();
        }

        function bindAuthTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.form').forEach(f => f.classList.add('hidden'));
                    tab.classList.add('active');
                    document.getElementById(target + '-form').classList.remove('hidden');
                    document.querySelectorAll('.error').forEach(e => e.textContent = '');
                });
            });
        }

        function bindForms() {
            document.getElementById('register-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('reg-username').value;
                const password = document.getElementById('reg-password').value;
                const errorEl = document.getElementById('reg-error');
                if (!username || !password) { errorEl.textContent = '用户名和密码不能为空'; return; }
                try {
                    const res = await fetch(`${API_BASE}/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                    const data = await res.json();
                    if (data.success) { alert('注册成功'); document.querySelectorAll('.tab')[1].click(); document.getElementById('register-form').reset(); }
                    else errorEl.textContent = data.message;
                } catch (err) { errorEl.textContent = '网络错误'; }
            });

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('login-username').value;
                const password = document.getElementById('login-password').value;
                const errorEl = document.getElementById('login-error');
                if (!username || !password) { errorEl.textContent = '用户名和密码不能为空'; return; }
                try {
                    const res = await fetch(`${API_BASE}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                    const data = await res.json();
                    if (data.success) { user = data.data; localStorage.setItem('user', JSON.stringify(user)); document.getElementById('login-form').reset(); showDashboard(); }
                    else errorEl.textContent = data.message;
                } catch (err) { errorEl.textContent = '网络错误'; }
            });
        }

        function bindDashboard() {
            document.querySelector('.logout').addEventListener('click', () => {
                localStorage.removeItem('user');
                document.getElementById('dashboard-page').classList.add('hidden');
                document.getElementById('auth-page').classList.remove('hidden');
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
                    btn.classList.add('active');
                    document.getElementById(target + '-panel').classList.remove('hidden');
                    if (target === 'view') loadRecords();
                });
            });

            document.querySelectorAll('input[name="sort"]').forEach(radio => { radio.addEventListener('change', updateCategories); });

            document.getElementById('add-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const sort = document.querySelector('input[name="sort"]:checked').value;
                const category = document.getElementById('category').value;
                const amount = parseFloat(document.getElementById('amount').value);
                const note = document.getElementById('note').value;
                const dateStr = document.getElementById('date').value;
                const total = parseFloat(document.getElementById('total').value);
                if (!category) { alert('请选择分类'); return; }
                if (isNaN(amount) || amount <= 0) { alert('金额必须大于0'); return; }
                if (isNaN(total)) { alert('余额不能为空'); return; }
                try {
                    if (!user || !user.id) { alert('请先登录'); return; }
                    const res = await fetch(`${API_BASE}/CreateRecord`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: user.id, sort, category, amount, note, date: new Date(dateStr).toISOString(), total }) });
                    const data = await res.json();
                    if (data.success) { alert('保存成功'); document.getElementById('add-form').reset(); document.querySelector('input[name="sort"][value="Income"]').checked = true; updateCategories(); }
                    else alert(data.message);
                } catch (err) { alert('网络错误: ' + err.message); }
            });
        }

        function updateCategories() {
            const sort = document.querySelector('input[name="sort"]:checked').value;
            const categorySelect = document.getElementById('category');
            const categories = sort === 'Income' ? IncomeCategories : ExpenseCategories;
            categorySelect.innerHTML = '<option value="">请选择分类</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categorySelect.appendChild(option);
            });
        }

        function checkLogin() { if (localStorage.getItem('user')) showDashboard(); }

        function showDashboard() {
            user = JSON.parse(localStorage.getItem('user'));
            document.getElementById('user-name').textContent = '欢迎, ' + user.name;
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('hidden');
            document.getElementById('date').value = new Date().toISOString().slice(0, 16);
        }

        async function loadRecords() {
            try {
                if (!user || !user.id) { alert('请先登录'); return; }
                const res = await fetch(`${API_BASE}/ShowRecord1`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: user.id }) });
                const data = await res.json();
                if (data.success) { renderRecords(data.data); updateStats(data.data); }
                else { renderRecords([]); updateStats([]); }
            } catch (err) { renderRecords([]); updateStats([]); }
        }

        function renderRecords(records) {
            const tbody = document.getElementById('records-body');
            const empty = document.getElementById('empty');
            tbody.innerHTML = '';
            if (!records || records.length === 0) { empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            records.forEach(record => {
                const row = document.createElement('tr');
                const date = new Date(record.date).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
                row.innerHTML = `<td><span style="color:${record.sort === 'Income' ? '#4caf50' : '#e53935'};font-weight:bold;">${record.sort === 'Income' ? '收入' : '支出'}</span></td><td>${record.category}</td><td><span style="color:${record.sort === 'Income' ? '#4caf50' : '#e53935'};">¥${record.amount.toFixed(2)}</span></td><td>${record.note || '-'}</td><td>${date}</td><td><button class="delete" onclick="deleteRecord(${record.id})">删除</button></td>`;
                tbody.appendChild(row);
            });
        }

        function updateStats(records) {
            let income = 0, expense = 0;
            records.forEach(r => { if (r.sort === 'Income') income += r.amount; else expense += r.amount; });
            document.getElementById('total-income').textContent = '¥' + income.toFixed(2);
            document.getElementById('total-expense').textContent = '¥' + expense.toFixed(2);
            document.getElementById('balance').textContent = '¥' + (income - expense).toFixed(2);
        }

        async function deleteRecord(id) {
            if (!confirm('确定删除？')) return;
            try {
                if (!user || !user.id) { alert('请先登录'); return; }
                const res = await fetch(`${API_BASE}/DeleteRecord1`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, user_id: user.id }) });
                const data = await res.json();
                if (data.success) loadRecords(); else alert(data.message);
            } catch (err) { alert('网络错误: ' + err.message); }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
